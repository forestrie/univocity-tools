name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create3 defaults snapshot
        run: bun run check:create3

      - name: Prettier check
        run: bun run check

      - name: Subprocess policy
        run: bun run check:subprocess

      - name: CLI policy
        run: bun run check:cli

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build apps
        run: bun run build

  darwin-smoke:
    name: Darwin deployer smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build darwin deployer binary
        run: bun run build:binary:darwin-arm64

      - name: Smoke test deployer --help
        run: ./apps/deployer/dist/deployer-darwin-arm64 --help
