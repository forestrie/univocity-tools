name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run check

      - name: Subprocess policy
        run: bun run check:subprocess

      - name: CLI policy
        run: bun run check:cli

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build apps
        run: bun run build
