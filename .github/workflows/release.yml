name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Linux binaries and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create3 defaults snapshot
        run: bun run check:create3

      - name: Build Linux binaries
        run: bun run build:binary:linux-x64

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release
          for app in contract-artefacts deployer; do
            binary="apps/${app}/dist/${app}-linux-x64"
            cp "${binary}" "release/${app}-linux-x64"
            shasum -a 256 "release/${app}-linux-x64" > "release/${app}-linux-x64.sha256"
          done
          chmod +x release/*-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/contract-artefacts-linux-x64
            release/contract-artefacts-linux-x64.sha256
            release/deployer-linux-x64
            release/deployer-linux-x64.sha256
