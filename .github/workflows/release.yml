name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create3 defaults snapshot
        run: bun run check:create3

      - name: Build Linux binaries
        run: bun run build:binary:linux-x64

      - name: Stage Linux release assets
        run: |
          set -euo pipefail
          mkdir -p release-staging
          cp apps/contract-artefacts/dist/contract-artefacts-linux-x64 release-staging/
          cp apps/deployer/dist/deployer-linux-x64 release-staging/

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-staging/*
          if-no-files-found: error

  release-darwin:
    name: Build darwin-arm64 binaries
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create3 defaults snapshot
        run: bun run check:create3

      - name: Build darwin-arm64 binaries
        run: bun run build:binary:darwin-arm64

      - name: Smoke test darwin deployer binary
        run: ./apps/deployer/dist/deployer-darwin-arm64 --help

      - name: Stage darwin release assets
        run: |
          set -euo pipefail
          mkdir -p release-staging
          cp apps/contract-artefacts/dist/contract-artefacts-darwin-arm64 release-staging/
          cp apps/deployer/dist/deployer-darwin-arm64 release-staging/

      - name: Upload darwin release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin
          path: release-staging/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [release-linux, release-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release/linux

      - name: Download darwin assets
        uses: actions/download-artifact@v4
        with:
          name: release-darwin
          path: release/darwin

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p upload
          cp release/linux/contract-artefacts-linux-x64 upload/
          cp release/linux/deployer-linux-x64 upload/
          cp release/darwin/contract-artefacts-darwin-arm64 upload/
          cp release/darwin/deployer-darwin-arm64 upload/
          for binary in upload/*; do
            shasum -a 256 "$binary" > "${binary}.sha256"
          done
          chmod +x upload/*-linux-x64 upload/*-darwin-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            upload/contract-artefacts-linux-x64
            upload/contract-artefacts-linux-x64.sha256
            upload/deployer-linux-x64
            upload/deployer-linux-x64.sha256
            upload/contract-artefacts-darwin-arm64
            upload/contract-artefacts-darwin-arm64.sha256
            upload/deployer-darwin-arm64
            upload/deployer-darwin-arm64.sha256
