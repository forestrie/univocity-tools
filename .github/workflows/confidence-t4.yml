name: Confidence T4

permissions:
  contents: read

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  list-releases-confidence:
    name: list-releases confidence (T4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: T4 list-releases confidence
        run: bun test packages/contract-artefacts/test/e2e/list-releases.confidence.test.ts
